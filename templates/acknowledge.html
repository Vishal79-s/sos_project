<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exact Patient Location</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
  body { margin:0; background:#12141a; color:#eee; }
  .header {
    padding: 20px 24px 10px;
  }
  .badge {
    display:inline-block; color:#2ecc71; font-size:12px; font-weight:bold;
    letter-spacing:1px; background:rgba(46,204,113,0.12);
    padding:4px 10px; border-radius:20px; margin-bottom:10px;
  }
  h1 { margin: 6px 0 4px; font-size: 22px; }
  p.sub { color:#999; margin:0 0 4px; font-size:14px; }
  #map { height: 65vh; width: 100%; }
  .footer {
    padding: 16px 24px 26px;
  }
  a.btn {
    display:inline-block; background:#f5a623; color:#1a1a1a; font-weight:bold;
    padding:12px 22px; border-radius:8px; text-decoration:none; font-size:14px;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div class="header">
    <span class="badge">✓ LOCATION RECEIVED</span>
    <h1>Patient: {{ patient_name }}</h1>
    <p class="sub">Nearest hospital: {{ hospital_name }}</p>
    <p class="sub">Exact coordinates: {{ lat }}, {{ lon }}</p>
</div>

<div id="map"></div>

<div class="footer">
    <a class="btn" href="https://www.google.com/maps/dir/?api=1&origin={{ hospital_lat }},{{ hospital_lon }}&destination={{ lat }},{{ lon }}" target="_blank">
        🧭 Get Directions to Patient
    </a>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const lat = {{ lat }};
  const lon = {{ lon }};

  const map = L.map('map').setView([lat, lon], 15);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  L.marker([lat, lon]).addTo(map)
    .bindPopup("🚨 Patient's exact location")
    .openPopup();
</script>

</body>
</html>
